[workspace]
name = "computational-genomics"
version = "0.1.0"
description = "Performance-oriented genomics library with GPU-accelerated kernels in Mojo"
channels = ["https://conda.modular.com/max-nightly/", "conda-forge"]
platforms = ["osx-arm64", "linux-64", "linux-aarch64"]

[dependencies]
max = "*"

[tasks]
test-dna       = "mojo run tests/test_dna.mojo"
test-sequence  = "mojo run tests/test_sequence.mojo"
test-kmer      = "mojo run tests/test_kmer.mojo"
test-alignment = "mojo run tests/test_alignment.mojo"
test-sliding   = "mojo run tests/test_sliding_window.mojo"
test-real-data = "mojo run tests/test_real_data.mojo"
test           = { depends-on = ["test-dna", "test-sequence", "test-kmer", "test-alignment", "test-sliding", "test-real-data"] }
bench-kmer   = "mojo run benchmarks/bench_kmer.mojo"
bench-align  = "mojo run benchmarks/bench_alignment.mojo"
bench-memory = "mojo run benchmarks/bench_memory.mojo"
build        = "mojo package genomics -o genomics.mojopkg"

[feature.dev.dependencies]
python = ">=3.11"

[feature.dev.tasks]
fmt    = "mojo format genomics/ benchmarks/ tests/"
bench  = { depends-on = ["bench-kmer", "bench-align", "bench-memory"] }

[environments]
dev = { features = ["dev"], solve-group = "default" }
